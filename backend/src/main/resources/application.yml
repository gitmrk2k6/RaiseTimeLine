spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/raisetimeline
    username: raisetimeline
    password: raisetimeline
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: "${JWT_SECRET:dev-secret-key-for-local-development-must-be-at-least-256-bits-long}"
    expiration-ms: 86400000

server:
  port: 8081

logging:
  level:
    com.raisetimeline: DEBUG
