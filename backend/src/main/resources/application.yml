spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/raisetimeline
    username: raisetimeline
    password: raisetimeline
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: "${JWT_SECRET:dev-secret-key-for-local-development-must-be-at-least-256-bits-long}"
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000
  s3:
    bucket: "${S3_BUCKET:}"
    region: "${AWS_REGION:ap-northeast-1}"
    local-base-url: "${LOCAL_BASE_URL:http://localhost:8080}"

server:
  port: 8080

logging:
  level:
    com.raisetimeline: DEBUG
