name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # フロントエンド: lint / typecheck / 単体テスト
  # ─────────────────────────────────────────────
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test -- --run

  # ─────────────────────────────────────────────
  # バックエンド: Checkstyle + JUnit テスト
  # ─────────────────────────────────────────────
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest

      - name: Unit / Integration tests
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test

  # ─────────────────────────────────────────────
  # E2E テスト（Playwright）
  # quality check が通った後に実行
  # ─────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]

    steps:
      - uses: actions/checkout@v4

      # ── Java + Node.js セットアップ ──
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ── PostgreSQL 起動 ──
      - name: Start PostgreSQL (docker compose)
        run: docker compose up -d

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T db pg_isready -U raisetimeline && break
            sleep 2
          done

      # ── バックエンド起動 ──
      - name: Make gradlew executable
        working-directory: backend
        run: chmod +x ./gradlew

      - name: Start backend
        working-directory: backend
        run: ./gradlew bootRun &
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/raisetimeline
          SPRING_DATASOURCE_USERNAME: raisetimeline
          SPRING_DATASOURCE_PASSWORD: raisetimeline
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          S3_BUCKET: ""

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            wget -q -O /dev/null http://localhost:8080/actuator/health && break
            sleep 2
          done

      # ── フロントエンド起動 ──
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start frontend
        working-directory: frontend
        run: npm run dev &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api

      - name: Wait for frontend
        run: |
          for i in $(seq 1 15); do
            wget -q -O /dev/null http://localhost:3000 && break
            sleep 2
          done

      # ── Playwright 実行 ──
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e:ci
        env:
          CI: true
          PLAYWRIGHT_API_URL: http://localhost:8080/api

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: performance/playwright/reports/
          retention-days: 7
